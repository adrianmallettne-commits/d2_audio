title: D2 Audio Compression & Voice Auth
description: >-
  Compress audio to the D2 format (peak extraction + Bézier reconstruction)
  and restore it to WAV. Includes D2 voice fingerprinting for lightweight
  speaker authentication without cloud or ML dependencies.
  Original research by Adrian Mallett (2021).
github: https://github.com/adrianmallettne/d2_audio
